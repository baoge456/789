<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVBox 万能容错转换器</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 1400px; }
        @media (max-width: 950px) { .container { grid-template-columns: 1fr; } }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        textarea { width: 100%; height: 500px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; box-sizing: border-box; resize: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-main { background: var(--primary); color: white; }
        .status-bar { padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; display: none; }
        .filename-box { display: flex; align-items: center; gap: 5px; margin-top: 10px; background: #f1f5f9; padding: 10px; border-radius: 8px; font-size: 13px; }
        .filename-input { border: 1px solid #cbd5e1; padding: 5px 8px; border-radius: 4px; width: 100px; }
    </style>
</head>
<body>

    <h2 style="color:var(--primary)">TVBox 容错合并转换器</h2>
    
    <div class="container">
        <div class="card">
            <h3>📥 输入区 (支持乱序、残缺 JSON)</h3>
            <div id="statusBox" class="status-bar"></div>
            <textarea id="rawInput" placeholder="直接粘贴多段内容，哪怕中间有错误，程序也会尝试强行提取有效站点..."></textarea>
            <div class="btn-group">
                <button class="btn-main" onclick="forceExtract()">⚡ 强行识别并合并</button>
                <button style="background:#e2e8f0;" onclick="location.reload()">🔄 刷新重置</button>
            </div>
        </div>

        <div class="card">
            <h3>📦 合并结果 <span id="siteCount" style="background:var(--primary);color:#fff;padding:2px 8px;border-radius:10px;font-size:12px">0</span></h3>
            <textarea id="finalOutput" readonly></textarea>
            
            <div class="filename-box">
                <span>导出：</span>
                <input type="text" id="fn_prefix" class="filename-input" value="tvboxconfig">
                <span>-</span>
                <input type="text" id="fn_suffix" class="filename-input" value="1" style="width:50px">
                <span>.json</span>
            </div>

            <div class="btn-group">
                <button class="btn-main" style="background:#10b981" onclick="copyResult()">📋 复制</button>
                <button style="background:#0ea5e9;color:#fff" onclick="downloadJson()">💾 下载</button>
            </div>
        </div>
    </div>

    <script>
        let masterMap = new Map();

        function logStatus(msg, type) {
            const el = document.getElementById('statusBox');
            el.style.display = 'block';
            el.style.background = type === 'success' ? '#f0fdf4' : '#fef2f2';
            el.style.color = type === 'success' ? '#16a34a' : '#ef4444';
            el.innerText = msg;
        }

        // 【核心改进】强行识别逻辑：不再依赖整个 JSON 块的合法性
        function forceExtract() {
            const text = document.getElementById('rawInput').value.trim();
            if (!text) return;

            // 1. 使用正则表达式匹配每一个类似 { "name":..., "url":... } 的对象
            // 这种方法可以无视两段 JSON 之间的语法错误
            const objectRegex = /\{[^{}]*"(url|api|source)"\s*:\s*"[^"]+"[^{}]*\}/gi;
            const matches = text.match(objectRegex);

            if (!matches) {
                logStatus("❌ 未能识别到符合特征的站点对象，请检查内容。", "error");
                return;
            }

            let count = 0;
            matches.forEach(itemStr => {
                try {
                    // 尝试清理对象字符串（有时正则抓取会带一点杂质）
                    const cleanStr = itemStr.replace(/^[^{]*/, "").replace(/[^}]*$/, "");
                    const obj = JSON.parse(cleanStr);
                    
                    const api = obj.api || obj.url || obj.source;
                    const name = obj.name || obj.title || obj.label || "未知";

                    if (api && typeof api === 'string') {
                        const finger = api.toLowerCase().trim();
                        masterMap.set(finger, {
                            "key": obj.id || obj.key || `k_${Math.random().toString(36).slice(2,5)}`,
                            "name": name.replace(/🎬-?|🎬/g, ""),
                            "type": 1,
                            "api": api.includes('?') ? `${api}&ac=list` : `${api}?ac=list`,
                            "searchable": 1,
                            "quickSearch": 1,
                            "filterable": 1,
                            "ext": obj.detail || obj.detailUrl || ""
                        });
                        count++;
                    }
                } catch (e) {
                    // 如果单条解析还是失败，静默跳过，保证大部队成功
                }
            });

            if (count > 0) {
                logStatus(`✅ 成功识别并提取 ${count} 个有效站点（已自动去重）`, "success");
                render();
            } else {
                logStatus("⚠️ 找到结构但无法解析具体字段，请检查内容。", "error");
            }
        }

        function render() {
            const sites = Array.from(masterMap.values());
            const config = {
                "spider": "https://raw.githubusercontent.com/FongMi/CatVodSpider/main/jar/custom_spider.jar",
                "sites": sites,
                "parses": [{"name":"解析","type":0,"url":"https://jx.xmflv.com/?url="}]
            };
            document.getElementById('finalOutput').value = JSON.stringify(config, null, 4);
            document.getElementById('siteCount').innerText = sites.length;
        }

        function copyResult() {
            const area = document.getElementById('finalOutput');
            area.select();
            document.execCommand('copy');
            alert("已复制结果");
        }

        function downloadJson() {
            const prefix = document.getElementById('fn_prefix').value || "tvboxconfig";
            const suffix = document.getElementById('fn_suffix').value || "1";
            const blob = new Blob([document.getElementById('finalOutput').value], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${prefix}-${suffix}.json`;
            a.click();
        }
    </script>
</body>
</html>
