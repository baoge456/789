<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>书签导航页自动生成</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            margin: 20px;
            background-color: #f0f0f0;
            box-sizing: border-box;
        }

        .panel {
            max-width: 90%;
            width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #c2f2d0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
        }

        .header-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .example-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .example-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background-color: #2980b9;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 12px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            padding: 8px;
            max-width: 100%;
            margin: 10px auto;
        }
        
        #bookmarkContainer {
            display: block;
        }
        
        .group-section {
            margin-bottom: 20px;
        }

        .group-title {
            position: relative;
            padding-left: 15px;
            margin-bottom: 10px;
            text-align: left;
        }

        .group-title::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 20px;
            background-color: #4CAF50;
        }

        .card {
            border-radius: 20px;
            padding: 8px 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            position: relative;
            text-align: left;
            min-width: 0;
            box-sizing: border-box;
            cursor: pointer;
            width: 100%;
            margin-bottom: 5px;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .thumbnail {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .card a {
            text-decoration: none;
            font-size: 0.85em;
            word-break: break-word;
            text-align: left;
            color: var(--text-color);
            box-sizing: border-box;
            flex-grow: 1;
        }

        /* 编辑模式下的按钮组 - 竖向排列 */
        .edit-controls {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-left: 8px;
            flex-shrink: 0;
        }
        
        .edit-mode-on .edit-controls {
            display: flex;
        }
        
        .edit-btn {
            padding: 4px 6px;
            margin: 0;
            background-color: #f0ad4e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            min-width: 28px;
            text-align: center;
            transition: all 0.2s;
        }
        
        .edit-btn:hover {
            transform: scale(1.05);
        }
        
        .edit-btn.edit-bookmark {
            background-color: #5bc0de;
        }
        
        .edit-btn.delete {
            background-color: #d9534f;
        }
        
        .edit-btn.move {
            background-color: #5bc0de;
        }
        
        /* 分组标题的编辑按钮组 - 横向排列 */
        .group-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        .group-edit-btn {
            padding: 4px 8px;
            margin: 0;
            background-color: #f0ad4e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .group-edit-btn:hover {
            transform: scale(1.05);
        }
        
        .group-edit-btn.delete {
            background-color: #d9534f;
        }
        
        .group-edit-btn.move {
            background-color: #5bc0de;
        }
        
        .file-input {
            display: none;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: fadeInOut 2s ease forwards;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90vw;
            white-space: normal;
            text-align: center;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 10px; }
            15% { opacity: 1; bottom: 30px; }
            85% { opacity: 1; bottom: 30px; }
            100% { opacity: 0; bottom: 10px; visibility: hidden; }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }

        .modal label {
            display: block;
            margin: 12px 0 5px;
            font-weight: 500;
        }

        .modal input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .thumbnail-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .thumbnail-preview img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .edit-modal-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            gap: 10px;
        }

        .edit-modal-buttons button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #5cb85c;
            color: white;
            flex: 1;
        }

        .edit-modal-buttons button.delete {
            background-color: #d9534f;
        }
        
        .category-nav {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 5px;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #e0f7e9;
            border-radius: 8px;
            justify-content: flex-start;
            scrollbar-width: thin;
            scrollbar-color: #4CAF50 #e0f7e9;
        }
        
        .category-nav::-webkit-scrollbar {
            height: 6px;
        }
        
        .category-nav::-webkit-scrollbar-track {
            background: #e0f7e9;
            border-radius: 3px;
        }
        
        .category-nav::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 3px;
        }

        .category-btn {
            padding: 6px 12px;
            margin: 2px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .category-btn:hover {
            background-color: #45a049;
            transform: translateY(-1px);
        }

        .category-btn.active {
            background-color: #2E7D32;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
                gap: 4px;
                padding: 4px;
            }

            .card {
                border-radius: 15px;
                padding: 6px 8px;
            }

            .card a {
                font-size: 0.75em;
            }
            
            .edit-btn {
                padding: 3px 4px;
                font-size: 9px;
                min-width: 22px;
            }
            
            .group-edit-btn {
                padding: 3px 6px;
                font-size: 10px;
            }
            
            .header-buttons {
                top: 10px;
                right: 10px;
            }
            
            .example-btn {
                padding: 5px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <div class="panel">
        <div class="header-buttons">
            <button class="example-btn" id="exampleBtn">📋 示例格式</button>
        </div>
        
        <h1>书签导航页自动生成</h1>
        
        <div class="button-container">
            <button id="importFileBtn" style="background: #3498db;">📁 导入文件</button>
            <button onclick="openTool()" style="background: #5cb85c;">🔧 书签JSON管理</button>
        </div>

        <textarea id="jsonInput"
            placeholder="使用指南：在此处粘贴 JSON 数据，支持宝哥书签类及书签整理类页面导出的JSON文件，例如：sunpanel/书签导航/书签管理系统/单书签自动排序/含分组书签自动排序/链接检测面板，目的是将各种书签类页面统一整合成易于部署的html网页，点击自动转换后列出的预览页面中，可修改生成页面的背景颜色和书签面板的背景颜色，另外，长按书签可以实现书签的 添加/修改/删除 三个功能，编辑修改后可支持导出新的HTML页面和新的JSON数据，导出密码请联系作者本人获取......"></textarea>
        <button onclick="importJson()">自动转换</button>

        <div>
            <label for="pageBackgroundColor">页面背景颜色：</label>
            <input type="color" id="pageBackgroundColor" value="#f5f5f5" oninput="updateColors()">
        </div>

        <div>
            <label for="panelBackgroundColor">面板背景颜色：</label>
            <input type="color" id="panelBackgroundColor" value="#c2f2d0" oninput="updateColors()">
        </div>

        <button onclick="toggleEditMode()" id="editModeBtn">✏️ 编辑模式</button>
        <button onclick="checkPasswordAndExport()">📄 导出 HTML</button>
        <button onclick="checkPasswordAndGenerateJson()">📦 导出新JSON</button>

        <div id="bookmarkContainer"></div>

        <!-- 编辑书签的模态框 -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3>✏️ 编辑书签</h3>
                <label>名称：</label>
                <input type="text" id="editName">
                <label>链接：</label>
                <input type="url" id="editUrl">
                <label>Logo链接：</label>
                <input type="url" id="editThumbnail" placeholder="输入图片URL或留空自动获取favicon">
                <div class="thumbnail-preview" id="thumbnailPreview">
                    <span>当前预览：</span>
                    <img id="previewImg" src="" alt="预览">
                </div>
                <div class="edit-modal-buttons">
                    <button onclick="saveEditChanges()">💾 保存修改</button>
                    <button onclick="deleteBookmark()" class="delete">🗑️ 删除书签</button>
                </div>
            </div>
        </div>

        <!-- 添加书签的模态框 -->
        <div id="addModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3>➕ 添加书签</h3>
                <label>名称：</label>
                <input type="text" id="addName">
                <label>链接：</label>
                <input type="url" id="addUrl">
                <label>Logo链接：</label>
                <input type="url" id="addThumbnail" placeholder="可选，留空自动获取favicon">
                <div class="thumbnail-preview" id="addThumbnailPreview">
                    <span>预览：</span>
                    <img id="addPreviewImg" src="" alt="预览">
                </div>
                <div class="edit-modal-buttons">
                    <button onclick="saveNewBookmark()">➕ 添加书签</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentData;
        let pressTimer;
        let currentCard;
        let currentItem;
        let currentGroupIndex;
        let currentItemIndex;
        const defaultColors = ['#FFC107', '#2196F3', '#4CAF50', '#9C27B0', '#FF5722', '#00BCD4', '#E91E63', '#673AB7', '#3F51B5', '#009688'];
        const thumbnailLinks = [
            "https://s3.bmp.ovh/imgs/2025/03/12/5d0ea492ec025bef.png",
            "https://s3.bmp.ovh/imgs/2025/03/12/6701e8265b270a63.jpeg",
            "https://s3.bmp.ovh/imgs/2025/03/18/aef7b7fc61d0738b.png",
            "https://s3.bmp.ovh/imgs/2025/03/12/86490ad28b87f7e3.png",
            "https://s3.bmp.ovh/imgs/2025/03/12/f7dc5f482df9c47f.jpg",
            "https://s3.bmp.ovh/imgs/2025/03/12/19ce72a42876f8b2.jpg",
            "https://s3.bmp.ovh/imgs/2025/03/13/33a4d0d68f920aa3.jpg",
            "https://s3.bmp.ovh/imgs/2025/03/13/6db1a8b21eb9d1c7.jpg",
            "https://s3.bmp.ovh/imgs/2025/03/18/6cf485cbe020d924.png",
            "https://s3.bmp.ovh/imgs/2025/03/16/7f393fadfc192e1a.png"
        ];

        let thumbnailIndex = 0;
        let pageBackgroundColor = '#f5f5f5';
        let panelBackgroundColor = '#c2f2d0';
        let editMode = false;

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            if (isError) toast.style.background = '#b91c1c';
            else toast.style.background = '#1e293b';
            document.body.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 2000);
        }

        function isColorDark(hexColor) {
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance < 0.5;
        }

        function openExampleLink() {
            window.open('https://file.baoge.wang/%E4%B9%A6%E7%AD%BE%E9%A1%B5%E9%9D%A2%E7%94%9F%E6%88%90%E8%84%9A%E6%9C%AC%E6%94%AF%E6%8C%81%E7%9A%84%E4%B8%89%E7%A7%8D%E7%A4%BA%E4%BE%8B%20JSON%20%E6%96%87%E4%BB%B6.txt', '_blank');
        }

        function openTool() {
            window.open('https://file.baoge.wang/%E4%B9%A6%E7%AD%BEjson%E7%AE%A1%E7%90%86', '_blank');
        }

        function importFile() {
            document.getElementById('fileInput')?.click();
            if (!document.getElementById('fileInput')) {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json,.txt';
                input.style.display = 'none';
                input.id = 'fileInput';
                document.body.appendChild(input);
                input.addEventListener('change', function(e) {
                    if (e.target.files.length) handleFileImport(e.target.files[0]);
                    input.value = '';
                });
                input.click();
            } else {
                document.getElementById('fileInput').click();
            }
        }

        function handleFileImport(file) {
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const jsonData = JSON.parse(content);
                    document.getElementById('jsonInput').value = content;
                    parseAndRenderJson(jsonData);
                    showToast(`✅ 成功导入: ${file.name} (${(content.length / 1024).toFixed(1)} KB)`);
                } catch (err) {
                    showToast(`❌ 文件解析失败: ${err.message}`, true);
                }
            };
            reader.onerror = function() {
                showToast('❌ 文件读取失败', true);
            };
            reader.readAsText(file, "UTF-8");
        }

        function parseAndRenderJson(jsonData) {
            try {
                if (Array.isArray(jsonData)) {
                    currentData = {
                        "icons": [
                            {
                                "title": "未分类",
                                "children": jsonData.map(item => ({
                                    "title": item.name || item.title,
                                    "url": item.url,
                                    "thumbnail": item.thumbnail || null,
                                    "backgroundColor": item.backgroundColor
                                }))
                            }
                        ]
                    };
                } else if (jsonData.icons) {
                    currentData = jsonData;
                } else {
                    currentData = {
                        icons: Object.entries(jsonData).map(([title, children]) => ({
                            title: title,
                            children: children.map(item => ({
                                "title": item.name || item.title,
                                "url": item.url,
                                "thumbnail": item.thumbnail || null,
                                "backgroundColor": item.backgroundColor
                            }))
                        }))
                    };
                }

                renderBookmarks();
                const lastCategory = localStorage.getItem('lastSelectedCategory') || '全部';
                setTimeout(() => {
                    switchCategory(lastCategory);
                }, 100);
            } catch (e) {
                showToast('无效的 JSON 数据', true);
                console.error(e);
            }
        }

        function importJson() {
            const jsonInput = document.getElementById('jsonInput').value;
            try {
                const jsonData = JSON.parse(jsonInput);
                parseAndRenderJson(jsonData);
            } catch (e) {
                showToast('无效的 JSON 数据', true);
                console.error(e);
            }
        }

        function getFaviconUrl(url) {
            try {
                const domain = new URL(url).hostname;
                return 'https://favicon.zhusl.com/ico?url=' + domain;
            } catch (e) {
                return 'https://www.google.com/s2/favicons?domain=example.com';
            }
        }
        
        function getBackupFaviconUrl(url) {
            try {
                const domain = new URL(url).hostname;
                return 'https://www.google.com/s2/favicons?domain=' + domain;
            } catch (e) {
                return null;
            }
        }
        
        function getThirdBackupFaviconUrl(url) {
            try {
                const domain = new URL(url).hostname;
                return 'https://api.faviconkit.com/' + domain + '/16';
            } catch (e) {
                return null;
            }
        }

        function getBestThumbnail(url, customThumbnail = null) {
            if (customThumbnail && customThumbnail.trim()) {
                return customThumbnail;
            }
            try {
                const domain = new URL(url).hostname;
                return 'https://favicon.zhusl.com/ico?url=' + domain;
            } catch (e) {
                return null;
            }
        }

        function renderBookmarks(category = '全部') {
            const bookmarkContainer = document.getElementById('bookmarkContainer');
            bookmarkContainer.innerHTML = '';
            bookmarkContainer.className = 'container';

            if (!currentData || !currentData.icons) return;

            const categoryNav = generateCategoryNav();
            bookmarkContainer.appendChild(categoryNav);

            currentData.icons.forEach((group, groupIndex) => {
                const groupSection = document.createElement('div');
                groupSection.className = 'group-section';
                const groupTitle = document.createElement('h2');
                groupTitle.className = 'group-title';
                
                if (editMode) {
                    const titleContainer = document.createElement('div');
                    titleContainer.style.display = 'flex';
                    titleContainer.style.alignItems = 'center';
                    titleContainer.style.justifyContent = 'space-between';
                    titleContainer.style.width = '100%';
                    titleContainer.style.flexWrap = 'wrap';
                    titleContainer.style.gap = '8px';
                    
                    const titleText = document.createElement('span');
                    titleText.textContent = group.title;
                    titleContainer.appendChild(titleText);
                    
                    const controls = document.createElement('div');
                    controls.className = 'group-controls';
                    
                    // 上移按钮
                    const moveUpBtn = document.createElement('button');
                    moveUpBtn.textContent = '↑';
                    moveUpBtn.className = 'group-edit-btn move';
                    moveUpBtn.title = '上移分类';
                    moveUpBtn.onclick = (e) => {
                        e.stopPropagation();
                        moveCategory(groupIndex, 'up');
                    };
                    
                    // 下移按钮
                    const moveDownBtn = document.createElement('button');
                    moveDownBtn.textContent = '↓';
                    moveDownBtn.className = 'group-edit-btn move';
                    moveDownBtn.title = '下移分类';
                    moveDownBtn.onclick = (e) => {
                        e.stopPropagation();
                        moveCategory(groupIndex, 'down');
                    };
                    
                    // 编辑按钮
                    const editBtn = document.createElement('button');
                    editBtn.textContent = '✏️';
                    editBtn.className = 'group-edit-btn';
                    editBtn.title = '编辑分类名称';
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        editCategory(groupIndex);
                    };
                    
                    // 添加分类按钮
                    const addCategoryAfterBtn = document.createElement('button');
                    addCategoryAfterBtn.textContent = '+';
                    addCategoryAfterBtn.className = 'group-edit-btn';
                    addCategoryAfterBtn.title = '在此后添加分类';
                    addCategoryAfterBtn.onclick = (e) => {
                        e.stopPropagation();
                        addCategoryAfter(groupIndex);
                    };
                    
                    // 删除按钮
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '🗑️';
                    deleteBtn.className = 'group-edit-btn delete';
                    deleteBtn.title = '删除分类';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteCategory(groupIndex);
                    };
                    
                    controls.appendChild(moveUpBtn);
                    controls.appendChild(moveDownBtn);
                    controls.appendChild(editBtn);
                    controls.appendChild(addCategoryAfterBtn);
                    controls.appendChild(deleteBtn);
                    
                    titleContainer.appendChild(controls);
                    groupTitle.appendChild(titleContainer);
                } else {
                    groupTitle.innerHTML = '';
                    const span = document.createElement('span');
                    span.style.display = 'inline-block';
                    span.style.width = '5px';
                    span.style.height = '20px';
                    groupTitle.appendChild(span);
                    groupTitle.appendChild(document.createTextNode(group.title));
                }
                
                groupSection.appendChild(groupTitle);

                const cardContainer = document.createElement('div');
                cardContainer.className = 'container';

                const groupBackgroundColor = defaultColors[groupIndex % defaultColors.length];
                
                group.children.forEach((item, itemIndex) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.backgroundColor = groupBackgroundColor;
                    const isDark = isColorDark(groupBackgroundColor);
                    const textColor = isDark ? '#fff' : '#000';
                    card.style.setProperty('--text-color', textColor);

                    const thumbnail = document.createElement('img');
                    thumbnail.className = 'thumbnail';
                    
                    const thumbnailUrl = getBestThumbnail(item.url, item.thumbnail);
                    if (thumbnailUrl) {
                        thumbnail.src = thumbnailUrl;
                        thumbnail.onerror = function() {
                            thumbnail.src = thumbnailLinks[thumbnailIndex % thumbnailLinks.length];
                            thumbnailIndex++;
                            thumbnail.onerror = null;
                        };
                    } else {
                        thumbnail.src = thumbnailLinks[thumbnailIndex % thumbnailLinks.length];
                        thumbnailIndex++;
                    }

                    card.appendChild(thumbnail);

                    const link = document.createElement('a');
                    link.href = item.url;
                    link.target = '_blank';
                    link.textContent = item.title;
                    link.style.color = textColor;
                    card.appendChild(link);
                    
                    if (editMode) {
                        const controls = document.createElement('div');
                        controls.className = 'edit-controls';
                        
                        const editBtn = document.createElement('button');
                        editBtn.textContent = '✏️';
                        editBtn.className = 'edit-btn edit-bookmark';
                        editBtn.title = '编辑书签';
                        editBtn.onclick = (e) => {
                            e.stopPropagation();
                            showEditModal(item, groupIndex, itemIndex);
                            currentItem = item;
                            currentCard = card;
                            currentGroupIndex = groupIndex;
                            currentItemIndex = itemIndex;
                        };
                        
                        const moveUpBtn = document.createElement('button');
                        moveUpBtn.textContent = '↑';
                        moveUpBtn.className = 'edit-btn move';
                        moveUpBtn.title = '上移';
                        moveUpBtn.onclick = (e) => {
                            e.stopPropagation();
                            moveBookmark(groupIndex, itemIndex, 'up');
                        };
                        
                        const moveDownBtn = document.createElement('button');
                        moveDownBtn.textContent = '↓';
                        moveDownBtn.className = 'edit-btn move';
                        moveDownBtn.title = '下移';
                        moveDownBtn.onclick = (e) => {
                            e.stopPropagation();
                            moveBookmark(groupIndex, itemIndex, 'down');
                        };
                        
                        const deleteBtn = document.createElement('button');
                        deleteBtn.textContent = '🗑️';
                        deleteBtn.className = 'edit-btn delete';
                        deleteBtn.title = '删除';
                        deleteBtn.onclick = (e) => {
                            e.stopPropagation();
                            deleteBookmarkFromCategory(groupIndex, itemIndex);
                        };
                        
                        const addBookmarkBtn = document.createElement('button');
                        addBookmarkBtn.textContent = '+';
                        addBookmarkBtn.className = 'edit-btn';
                        addBookmarkBtn.title = '添加书签';
                        addBookmarkBtn.onclick = (e) => {
                            e.stopPropagation();
                            addBookmarkToCategory(groupIndex);
                        };
                        
                        controls.appendChild(editBtn);
                        controls.appendChild(moveUpBtn);
                        controls.appendChild(moveDownBtn);
                        controls.appendChild(deleteBtn);
                        controls.appendChild(addBookmarkBtn);
                        card.appendChild(controls);
                    }

                    // 长按编辑功能
                    card.addEventListener('touchstart', function (e) {
                        if (!editMode) {
                            pressTimer = setTimeout(function () {
                                showEditModal(item, groupIndex, itemIndex);
                                currentItem = item;
                                currentCard = card;
                                currentGroupIndex = groupIndex;
                                currentItemIndex = itemIndex;
                            }, 500);
                        }
                    });

                    card.addEventListener('touchend', function () {
                        clearTimeout(pressTimer);
                    });

                    card.addEventListener('mousedown', function (e) {
                        if (!editMode) {
                            pressTimer = setTimeout(function () {
                                showEditModal(item, groupIndex, itemIndex);
                                currentItem = item;
                                currentCard = card;
                                currentGroupIndex = groupIndex;
                                currentItemIndex = itemIndex;
                            }, 500);
                        }
                    });

                    card.addEventListener('mouseup', function () {
                        clearTimeout(pressTimer);
                    });

                    cardContainer.appendChild(card);
                });

                groupSection.appendChild(cardContainer);
                bookmarkContainer.appendChild(groupSection);
            });
            
            if (category !== '全部') {
                const allGroups = document.querySelectorAll('.group-section');
                allGroups.forEach(group => {
                    const title = group.querySelector('.group-title');
                    if (title && title.textContent.trim().includes(category)) {
                        group.style.display = 'block';
                    } else {
                        group.style.display = 'none';
                    }
                });
            } else {
                const allGroups = document.querySelectorAll('.group-section');
                allGroups.forEach(group => group.style.display = 'block');
            }
            
            updateCategoryButtons();
        }

        function generateCategoryNav() {
            const categoryNav = document.createElement('div');
            categoryNav.className = 'category-nav';
            
            const allBtn = document.createElement('button');
            allBtn.className = 'category-btn';
            allBtn.textContent = '全部';
            allBtn.onclick = function() { switchCategory('全部'); };
            categoryNav.appendChild(allBtn);
            
            if (currentData && currentData.icons) {
                currentData.icons.forEach((group) => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.textContent = group.title;
                    btn.onclick = function() { switchCategory(group.title); };
                    categoryNav.appendChild(btn);
                });
            }
            return categoryNav;
        }
        
        function switchCategory(category) {
            const allGroups = document.querySelectorAll('.group-section');
            if (category === '全部') {
                allGroups.forEach(group => group.style.display = 'block');
            } else {
                allGroups.forEach(group => {
                    const title = group.querySelector('.group-title');
                    if (title && title.textContent.trim().includes(category)) {
                        group.style.display = 'block';
                    } else {
                        group.style.display = 'none';
                    }
                });
            }
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if (btn.textContent === category) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            localStorage.setItem('lastSelectedCategory', category);
        }
        
        function updateCategoryButtons() {
            const buttons = document.querySelectorAll('.category-btn');
            const lastCategory = localStorage.getItem('lastSelectedCategory') || '全部';
            buttons.forEach(btn => {
                if (btn.textContent === lastCategory) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function showEditModal(data, groupIndex, itemIndex) {
            const modal = document.getElementById('editModal');
            modal.querySelector('#editName').value = data.title || '';
            modal.querySelector('#editUrl').value = data.url || '';
            const thumbnailValue = data.thumbnail || '';
            modal.querySelector('#editThumbnail').value = thumbnailValue;
            
            const previewImg = document.getElementById('previewImg');
            if (thumbnailValue) {
                previewImg.src = thumbnailValue;
            } else {
                const faviconUrl = getBestThumbnail(data.url, null);
                previewImg.src = faviconUrl || thumbnailLinks[0];
            }
            
            const thumbnailInput = modal.querySelector('#editThumbnail');
            thumbnailInput.oninput = function() {
                if (this.value) {
                    previewImg.src = this.value;
                } else {
                    const faviconUrl = getBestThumbnail(data.url, null);
                    previewImg.src = faviconUrl || thumbnailLinks[0];
                }
            };
            
            modal.style.display = 'block';
            currentGroupIndex = groupIndex;
            currentItemIndex = itemIndex;
        }

        function saveEditChanges() {
            const modal = document.getElementById('editModal');
            const newTitle = modal.querySelector('#editName').value;
            const newUrl = modal.querySelector('#editUrl').value;
            const newThumbnail = modal.querySelector('#editThumbnail').value;

            if (currentCard && currentItem) {
                currentItem.title = newTitle;
                currentItem.url = newUrl;
                if (newThumbnail) {
                    currentItem.thumbnail = newThumbnail;
                } else {
                    delete currentItem.thumbnail;
                }
                currentCard.querySelector('a').textContent = newTitle;
                currentCard.querySelector('a').href = newUrl;
                const thumbnailImg = currentCard.querySelector('.thumbnail');
                const newThumbUrl = getBestThumbnail(newUrl, newThumbnail);
                if (newThumbUrl) {
                    thumbnailImg.src = newThumbUrl;
                }
            }

            modal.style.display = 'none';
            renderBookmarks();
            updateColors();
            showToast('✅ 书签已更新');
        }

        function saveNewBookmark() {
            const addModal = document.getElementById('addModal');
            const newTitle = addModal.querySelector('#addName').value;
            const newUrl = addModal.querySelector('#addUrl').value;
            const newThumbnail = addModal.querySelector('#addThumbnail').value;
            
            if (newTitle && newUrl) {
                const newBookmark = { title: newTitle, url: newUrl };
                if (newThumbnail) newBookmark.thumbnail = newThumbnail;
                currentData.icons[currentGroupIndex].children.push(newBookmark);
                addModal.style.display = 'none';
                renderBookmarks();
                showToast(`✅ 已添加书签: ${newTitle}`);
            } else {
                showToast('请输入书签名称和链接', true);
            }
        }

        function deleteBookmark() {
            if (confirm('确定要删除此书签吗？')) {
                currentData.icons[currentGroupIndex].children.splice(currentItemIndex, 1);
                document.getElementById('editModal').style.display = 'none';
                renderBookmarks();
                showToast('🗑️ 书签已删除');
            }
        }

        function updateColors() {
            pageBackgroundColor = document.getElementById('pageBackgroundColor').value;
            panelBackgroundColor = document.getElementById('panelBackgroundColor').value;
            document.body.style.backgroundColor = pageBackgroundColor;
            document.querySelector('.panel').style.backgroundColor = panelBackgroundColor;
        }
        
        function toggleEditMode() {
            editMode = !editMode;
            const editModeBtn = document.getElementById('editModeBtn');
            if (editMode) {
                editModeBtn.textContent = '✅ 完成编辑';
                editModeBtn.style.backgroundColor = '#d9534f';
                renderBookmarks();
                showToast('✏️ 编辑模式已开启，可直接点击按钮编辑');
            } else {
                editModeBtn.textContent = '✏️ 编辑模式';
                editModeBtn.style.backgroundColor = '#3498db';
                renderBookmarks();
                showToast('编辑模式已关闭');
            }
        }
        
        function moveCategory(groupIndex, direction) {
            if (direction === 'up' && groupIndex > 0) {
                [currentData.icons[groupIndex], currentData.icons[groupIndex - 1]] = 
                [currentData.icons[groupIndex - 1], currentData.icons[groupIndex]];
            } else if (direction === 'down' && groupIndex < currentData.icons.length - 1) {
                [currentData.icons[groupIndex], currentData.icons[groupIndex + 1]] = 
                [currentData.icons[groupIndex + 1], currentData.icons[groupIndex]];
            }
            renderBookmarks();
            showToast('✅ 分类顺序已更新');
        }
        
        function editCategory(groupIndex) {
            const oldName = currentData.icons[groupIndex].title;
            const newName = prompt('请输入新的分类名称：', oldName);
            if (newName && newName !== oldName) {
                currentData.icons[groupIndex].title = newName;
                renderBookmarks();
                showToast('✅ 分类已更新');
            }
        }
        
        function deleteCategory(groupIndex) {
            if (confirm('确定要删除分类 "' + currentData.icons[groupIndex].title + '" 吗？\n该分类下的所有书签也将被删除。')) {
                currentData.icons.splice(groupIndex, 1);
                renderBookmarks();
                showToast('🗑️ 分类已删除');
            }
        }
        
        function addCategoryAfter(groupIndex) {
            const categoryName = prompt('请输入新分类名称：');
            if (categoryName) {
                if (!currentData) currentData = { icons: [] };
                currentData.icons.splice(groupIndex + 1, 0, { title: categoryName, children: [] });
                renderBookmarks();
                showToast(`✅ 已添加分类: ${categoryName}`);
            }
        }
        
        function addBookmarkToCategory(groupIndex) {
            const modal = document.getElementById('addModal');
            modal.querySelector('#addName').value = '';
            modal.querySelector('#addUrl').value = '';
            modal.querySelector('#addThumbnail').value = '';
            document.getElementById('addPreviewImg').src = '';
            currentGroupIndex = groupIndex;
            modal.style.display = 'block';
        }
        
        function deleteBookmarkFromCategory(groupIndex, itemIndex) {
            if (confirm('确定要删除书签 "' + currentData.icons[groupIndex].children[itemIndex].title + '" 吗？')) {
                currentData.icons[groupIndex].children.splice(itemIndex, 1);
                renderBookmarks();
                showToast('🗑️ 书签已删除');
            }
        }
        
        function moveBookmark(groupIndex, itemIndex, direction) {
            const group = currentData.icons[groupIndex];
            if (direction === 'up' && itemIndex > 0) {
                [group.children[itemIndex], group.children[itemIndex - 1]] = 
                [group.children[itemIndex - 1], group.children[itemIndex]];
            } else if (direction === 'down' && itemIndex < group.children.length - 1) {
                [group.children[itemIndex], group.children[itemIndex + 1]] = 
                [group.children[itemIndex + 1], group.children[itemIndex]];
            }
            renderBookmarks();
        }

        function generateJsonFile() {
            const newJson = {};
            if (currentData && currentData.icons) {
                currentData.icons.forEach(group => {
                    newJson[group.title] = group.children.map(item => ({
                        name: item.title,
                        url: item.url
                    }));
                });
            }
            const jsonString = JSON.stringify(newJson, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bookmarks.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📦 JSON 已导出');
        }

        function checkPasswordAndExport() {
            const password = prompt('请输入导出密码：');
            if (password === 'baoge888') {
                alert('HTML导出功能');
            } else {
                showToast('密码错误，无法导出', true);
            }
        }

        function checkPasswordAndGenerateJson() {
            const password = prompt('请输入导出密码：');
            if (password === 'baoge888') {
                generateJsonFile();
            } else {
                showToast('密码错误，无法导出', true);
            }
        }

        document.querySelectorAll('.close').forEach(closeButton => {
            closeButton.addEventListener('click', function () {
                let modal = this.closest('.modal');
                if (modal) modal.style.display = 'none';
            });
        });

        window.onload = function () {
            const exampleBtn = document.getElementById('exampleBtn');
            const importBtn = document.getElementById('importFileBtn');
            
            exampleBtn.addEventListener('click', openExampleLink);
            importBtn.addEventListener('click', importFile);
            
            document.getElementById('jsonInput').value = '';
            currentData = null;
            renderBookmarks();
            updateColors();
        };
    </script>
</body>
</html>
