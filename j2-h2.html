<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>书签导航页 · 智能管理器</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
            transition: background-color 0.2s;
        }
        .panel {
            max-width: 1400px;
            width: 95%;
            margin: 20px auto;
            padding: 20px;
            background-color: #c2f2d0;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            transition: background-color 0.2s;
            position: relative;
        }
        .header-buttons {
            position: absolute;
            top: 20px;
            right: 24px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        .example-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            text-align: center;
            color: #1f3b2c;
        }
        .button-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            transition: 0.2s;
        }
        button:hover {
            filter: brightness(0.92);
        }
        textarea {
            width: 100%;
            height: 140px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            padding: 12px 16px;
            font-family: monospace;
            font-size: 12px;
            background: #fefce8;
            margin-bottom: 12px;
            resize: vertical;
        }
        .color-bar {
            display: flex;
            gap: 28px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
            background: rgba(255,255,240,0.5);
            padding: 8px 12px;
            border-radius: 60px;
        }
        .filename-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .filename-bar input {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid #ccc;
            width: 180px;
            text-align: center;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        #editModeBtn {
            background-color: #f39c12;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .group-section {
            margin-bottom: 32px;
            background: rgba(255,255,245,0.3);
            border-radius: 24px;
            padding: 8px 12px;
        }
        .group-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 6px 12px 6px 20px;
            background: rgba(0,0,0,0.03);
            border-radius: 40px;
            margin-bottom: 12px;
            font-size: 1.35rem;
            font-weight: 700;
            border-left: 6px solid #4caf50;
        }
        .card {
            border-radius: 24px;
            padding: 8px 12px;
            background-color: #ffd966;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }
        .thumbnail {
            width: 28px;
            height: 28px;
            border-radius: 30px;
            object-fit: cover;
            background: white;
            flex-shrink: 0;
        }
        .card a {
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            word-break: break-word;
            flex: 1;
            color: #1e1e2a;
        }
        .edit-controls {
            display: none;
            flex-direction: column;
            gap: 5px;
            margin-left: 6px;
            flex-shrink: 0;
        }
        .edit-mode-on .edit-controls {
            display: flex;
        }
        .edit-btn {
            padding: 4px 8px;
            background: #f0ad4e;
            border: none;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            text-align: center;
        }
        .edit-btn.edit-bookmark {
            background: #5bc0de;
        }
        .edit-btn.delete {
            background: #d9534f;
        }
        .edit-btn.move {
            background: #5bc0de;
        }
        .group-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .group-edit-btn {
            background: #f0ad4e;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            color: #1f2a3e;
        }
        .group-edit-btn.delete {
            background: #d9534f;
            color: white;
        }
        .group-edit-btn.move {
            background: #5bc0de;
            color: white;
        }
        .category-nav {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            padding: 10px 8px;
            background: #e9f7ef;
            border-radius: 48px;
            margin-bottom: 24px;
        }
        .category-btn {
            background: #4caf50;
            padding: 6px 18px;
            border-radius: 32px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: none;
            color: #fff;
            cursor: pointer;
        }
        .category-btn.active {
            background: #1b5e20;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 32px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            font-weight: bold;
        }
        .modal label {
            font-weight: 600;
            margin-top: 12px;
            display: block;
        }
        .modal input {
            width: 100%;
            padding: 10px;
            border-radius: 24px;
            border: 1px solid #ccc;
            margin-top: 4px;
        }
        .thumbnail-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        .edit-modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: space-between;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            z-index: 9999;
            font-size: 14px;
            animation: fadeInOut 2s forwards;
            pointer-events: none;
        }
        @keyframes fadeInOut {
            0% { opacity:0; bottom:0 }
            15% { opacity:1; bottom:30px }
            85% { opacity:1 }
            100% { opacity:0; bottom:0 }
        }
        @media (max-width: 680px) {
            .container {
                grid-template-columns: repeat(auto-fill, minmax(130px,1fr));
            }
            .card a {
                font-size: 0.75rem;
            }
            .group-title {
                font-size: 1.2rem;
            }
            body {
                margin: 8px;
            }
            .panel {
                margin: 10px auto;
                padding: 12px;
                width: 98%;
            }
        }
    </style>
</head>
<body>

<div class="panel" id="mainPanel">
    <div class="header-buttons">
        <button class="example-btn" id="exampleBtn">📋 示例格式</button>
    </div>
    <h1>📇 书签导航 · 全能管理器</h1>
    <div class="button-container">
        <button id="importFileBtn" style="background:#2c3e50;">📂 导入 JSON 文件</button>
        <button onclick="openTool()" style="background:#16a085;">⚙️ 书签JSON辅助工具</button>
    </div>
    <textarea id="jsonInput" placeholder='粘贴JSON数据'></textarea>
    <button onclick="importJson()" style="background:#27ae60;">✨ 自动转换并预览</button>

    <div class="color-bar">
        <div><label>页面背景:</label><input type="color" id="pageBackgroundColor" value="#f5f5f5" oninput="updateColors()"></div>
        <div><label>面板背景:</label><input type="color" id="panelBackgroundColor" value="#c2f2d0" oninput="updateColors()"></div>
    </div>

    <div class="filename-bar">
        <label>导出文件名：</label>
        <input type="text" id="exportPrefix" placeholder="无需填后缀">
    </div>

    <div class="action-buttons">
        <button id="editModeBtn">✏️ 编辑模式</button>
        <button id="exportHtmlBtn" style="background:#8e44ad;">📄 导出独立 HTML</button>
        <button id="exportJsonBtn" style="background:#2c3e50;">📦 导出当前 JSON</button>
    </div>

    <div id="bookmarkContainer"></div>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>🔒 请输入导出密码</h3>
        <input type="password" id="exportPassword" placeholder="密码">
        <div style="margin-top:20px;text-align:center;">
            <button id="confirmPwdBtn">✅ 确认</button>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>✏️ 编辑书签</h3>
        <label>名称</label><input id="editName">
        <label>链接</label><input id="editUrl">
        <label>图标(可选)</label><input id="editThumbnail">
        <div class="thumbnail-preview">
            <img id="previewImg" width="32" height="32" style="border-radius:50%">
        </div>
        <div class="edit-modal-buttons">
            <button id="saveEditBtn">💾 保存</button>
            <button id="deleteBookmarkBtn" style="background:#d9534f;">🗑️ 删除</button>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>➕ 添加书签</h3>
        <label>名称</label><input id="addName">
        <label>链接</label><input id="addUrl">
        <label>图标(可选)</label><input id="addThumbnail">
        <div class="thumbnail-preview">
            <img id="addPreviewImg" width="32" height="32" style="border-radius:50%">
        </div>
        <div style="margin-top:20px;text-align:center;">
            <button id="confirmAddBtn">✅ 添加</button>
        </div>
    </div>
</div>

<script>
    let currentData = { icons: [] };
    let editMode = false;
    let currentEditGroupIdx = -1, currentEditItemIdx = -1;
    let currentAddGroupIdx = -1;
    let pendingExportType = null;
    const EXPORT_PASSWORD = "baoge888";

    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        if (isErr) t.style.background = '#c0392b';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function getBestThumbnail(url, custom) {
        if (custom && custom.trim()) return custom;
        try {
            return `https://favicon.zhusl.com/ico?url=${new URL(url).hostname}`;
        } catch (e) {
            return "https://favicon.zhusl.com/ico?url=baidu.com";
        }
    }

    const colorPalette = ['#FFB74D','#81C784','#64B5F6','#BA68C8','#F06292','#4FC3F7','#A1887F','#E57373','#FFD54F','#7986CB'];

    function renderBookmarks() {
        const c = document.getElementById('bookmarkContainer');
        c.innerHTML = '';
        if (!currentData.icons.length) {
            c.innerHTML = '<div style="padding:40px;text-align:center;background:#f9eec1;border-radius:30px;">暂无数据</div>';
            return;
        }

        const nav = document.createElement('div');
        nav.className = 'category-nav';
        const all = document.createElement('button');
        all.className = 'category-btn active';
        all.textContent = '全部';
        all.onclick = () => filter('全部');
        nav.appendChild(all);

        currentData.icons.forEach(g => {
            const b = document.createElement('button');
            b.className = 'category-btn';
            b.textContent = g.title;
            b.onclick = () => filter(g.title);
            nav.appendChild(b);
        });
        c.appendChild(nav);

        currentData.icons.forEach((g, gi) => {
            const sec = document.createElement('div');
            sec.className = 'group-section';
            sec.dataset.cat = g.title;

            const title = document.createElement('div');
            title.className = 'group-title';
            const span = document.createElement('span');
            span.textContent = g.title;
            title.appendChild(span);

            if (editMode) {
                const gc = document.createElement('div');
                gc.className = 'group-controls';

                const up = document.createElement('button');
                up.className = 'group-edit-btn move';
                up.textContent = '↑';
                up.onclick = () => {
                    if (gi > 0) {
                        [currentData.icons[gi], currentData.icons[gi-1]] = [currentData.icons[gi-1], currentData.icons[gi]];
                        renderBookmarks();
                    }
                };

                const down = document.createElement('button');
                down.className = 'group-edit-btn move';
                down.textContent = '↓';
                down.onclick = () => {
                    if (gi < currentData.icons.length-1) {
                        [currentData.icons[gi], currentData.icons[gi+1]] = [currentData.icons[gi+1], currentData.icons[gi]];
                        renderBookmarks();
                    }
                };

                const rename = document.createElement('button');
                rename.className = 'group-edit-btn';
                rename.textContent = '改名';
                rename.onclick = () => {
                    const n = prompt('新名称', g.title);
                    if (n) {
                        g.title = n;
                        renderBookmarks();
                    }
                };

                const add = document.createElement('button');
                add.className = 'group-edit-btn';
                add.textContent = '+分类';
                add.onclick = () => {
                    const n = prompt('新分类');
                    if (n) {
                        currentData.icons.splice(gi+1, 0, { title: n, children: [] });
                        renderBookmarks();
                    }
                };

                const del = document.createElement('button');
                del.className = 'group-edit-btn delete';
                del.textContent = '删分类';
                del.onclick = () => {
                    if (confirm('删除该分类？')) {
                        currentData.icons.splice(gi, 1);
                        renderBookmarks();
                    }
                };

                gc.append(up, down, rename, add, del);
                title.appendChild(gc);
            }

            sec.appendChild(title);
            const grid = document.createElement('div');
            grid.className = 'container';
            const color = colorPalette[gi % colorPalette.length];

            g.children.forEach((it, ii) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.background = color;

                const img = document.createElement('img');
                img.className = 'thumbnail';
                img.src = getBestThumbnail(it.url, it.thumbnail);
                img.onerror = () => img.src = "https://favicon.zhusl.com/ico?url=baidu.com";
                card.appendChild(img);

                const a = document.createElement('a');
                a.href = it.url;
                a.target = '_blank';
                a.textContent = it.title;
                card.appendChild(a);

                card.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    openEditModal(gi, ii);
                });

                if (editMode) {
                    const ec = document.createElement('div');
                    ec.className = 'edit-controls';

                    const e = document.createElement('button');
                    e.className = 'edit-btn edit-bookmark';
                    e.textContent = 'i';
                    e.onclick = () => {
                        openEditModal(gi, ii);
                    };

                    const u = document.createElement('button');
                    u.className = 'edit-btn move';
                    u.textContent = '↑';
                    u.onclick = () => {
                        if (ii > 0) {
                            [g.children[ii], g.children[ii-1]] = [g.children[ii-1], g.children[ii]];
                            renderBookmarks();
                        }
                    };

                    const d = document.createElement('button');
                    d.className = 'edit-btn move';
                    d.textContent = '↓';
                    d.onclick = () => {
                        if (ii < g.children.length-1) {
                            [g.children[ii], g.children[ii+1]] = [g.children[ii+1], g.children[ii]];
                            renderBookmarks();
                        }
                    };

                    const del = document.createElement('button');
                    del.className = 'edit-btn delete';
                    del.textContent = '删';
                    del.onclick = () => {
                        if (confirm('删除？')) {
                            g.children.splice(ii, 1);
                            renderBookmarks();
                        }
                    };

                    const addb = document.createElement('button');
                    addb.className = 'edit-btn';
                    addb.textContent = '+';
                    addb.onclick = () => {
                        currentAddGroupIdx = gi;
                        document.getElementById('addModal').style.display = 'flex';
                    };

                    ec.append(e, u, d, del, addb);
                    card.appendChild(ec);
                }
                grid.appendChild(card);
            });

            sec.appendChild(grid);

            if (editMode) {
                const bot = document.createElement('div');
                bot.style.textAlign = 'center';
                bot.style.marginTop = '10px';
                const btn = document.createElement('button');
                btn.textContent = '+ 书签';
                btn.style.padding = '6px 16px';
                btn.style.borderRadius = '30px';
                btn.style.background = '#27ae60';
                btn.style.color = '#fff';
                btn.onclick = () => {
                    currentAddGroupIdx = gi;
                    document.getElementById('addModal').style.display = 'flex';
                };
                bot.appendChild(btn);
                sec.appendChild(bot);
            }

            c.appendChild(sec);
        });

        function filter(cat) {
            document.querySelectorAll('.group-section').forEach(s => {
                s.style.display = cat === '全部' || s.dataset.cat === cat ? 'block' : 'none';
            });
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.toggle('active', b.textContent === cat);
            });
        }
    }

    function openEditModal(gIdx, iIdx) {
        const group = currentData.icons[gIdx];
        const item = group.children[iIdx];
        if (!item) return;
        currentEditGroupIdx = gIdx;
        currentEditItemIdx = iIdx;
        document.getElementById('editName').value = item.title || '';
        document.getElementById('editUrl').value = item.url || '';
        document.getElementById('editThumbnail').value = item.thumbnail || '';
        document.getElementById('previewImg').src = getBestThumbnail(item.url, item.thumbnail);
        document.getElementById('editModal').style.display = 'flex';
    }

    function toggleEdit() {
        editMode = !editMode;
        const btn = document.getElementById('editModeBtn');
        if (editMode) {
            btn.textContent = '✅ 退出编辑';
            btn.style.background = '#e67e22';
            document.getElementById('mainPanel').classList.add('edit-mode-on');
        } else {
            btn.textContent = '✏️ 编辑模式';
            btn.style.background = '#f39c12';
            document.getElementById('mainPanel').classList.remove('edit-mode-on');
        }
        renderBookmarks();
    }

    function importJson() {
        try {
            const v = document.getElementById('jsonInput').value;
            const j = JSON.parse(v);
            currentData.icons = [];
            if (j.icons) {
                currentData = j;
            } else {
                Object.keys(j).forEach(k => {
                    currentData.icons.push({
                        title: k,
                        children: j[k].map(i => ({
                            title: i.name || i.title,
                            url: i.url,
                            thumbnail: i.thumbnail || i.favicon
                        }))
                    });
                });
            }
            renderBookmarks();
            showToast('导入成功');
        } catch (e) {
            showToast('格式错误', true);
        }
    }

    function importFile() {
        const i = document.createElement('input');
        i.type = 'file';
        i.accept = '.json';
        i.onchange = e => {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = ev => {
                document.getElementById('jsonInput').value = ev.target.result;
                importJson();
            };
            r.readAsText(f);
        };
        i.click();
    }

    function showPwd(typ) {
        pendingExportType = typ;
        const pwdInput = document.getElementById('exportPassword');
        pwdInput.value = '';
        document.getElementById('passwordModal').style.display = 'flex';
        setTimeout(() => pwdInput.focus(), 50);
    }

    function checkPwd() {
        const v = document.getElementById('exportPassword').value;
        if (v === EXPORT_PASSWORD) {
            document.getElementById('passwordModal').style.display = 'none';
            if (pendingExportType === 'html') exportHtml();
            if (pendingExportType === 'json') exportJson();
        } else {
            showToast('密码错误', true);
        }
    }

    function saveEdit() {
        const g = currentData.icons[currentEditGroupIdx];
        const it = g.children[currentEditItemIdx];
        it.title = document.getElementById('editName').value;
        it.url = document.getElementById('editUrl').value;
        it.thumbnail = document.getElementById('editThumbnail').value;
        document.getElementById('editModal').style.display = 'none';
        renderBookmarks();
        showToast('已保存');
    }

    function delEdit() {
        if (confirm('确认删除？')) {
            currentData.icons[currentEditGroupIdx].children.splice(currentEditItemIdx, 1);
            document.getElementById('editModal').style.display = 'none';
            renderBookmarks();
            showToast('已删除');
        }
    }

    function addBook() {
        const name = document.getElementById('addName').value;
        const url = document.getElementById('addUrl').value;
        const thumb = document.getElementById('addThumbnail').value;
        if (!name || !url) {
            showToast('名称和链接不能为空', true);
            return;
        }
        currentData.icons[currentAddGroupIdx].children.push({
            title: name,
            url: url,
            thumbnail: thumb
        });
        document.getElementById('addModal').style.display = 'none';
        renderBookmarks();
        showToast('添加成功');
    }

    function exportHtml() {
        const prefix = document.getElementById('exportPrefix').value.trim() || 'bookmarks';
        const bgPage = document.getElementById('pageBackgroundColor').value;
        const bgPanel = document.getElementById('panelBackgroundColor').value;
        const dataStr = JSON.stringify(currentData);

        const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>书签导航</title>
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;background:${bgPage};font-family:sans-serif}
.page-wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}
.panel{
  width:100%;max-width:1000px;background:${bgPanel};border-radius:20px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,0.1)}
h1{text-align:center;margin:0 0 16px 0}
.category-nav{
  display:flex;gap:8px;overflow-x:auto;padding:10px;background:#e9f7ef;border-radius:24px;margin-bottom:20px
}
.category-btn{
  background:#4caf50;color:#fff;border:none;padding:8px 14px;border-radius:20px;white-space:nowrap;cursor:pointer
}
.category-btn.active{background:#1b5e20}
.group-section{margin-bottom:24px}
.group-title{font-size:16px;font-weight:bold;margin-bottom:10px;border-left:4px solid #4caf50;padding-left:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.card{
  background:#ffd966;
  border-radius:16px;
  padding:10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#fff}
.card a{text-decoration:none;color:#000;font-size:14px}
</style>
</head>
<body>
<div class="page-wrapper">
<div class="panel">
<h1>📖 书签导航</h1>
<div class="category-nav" id="nav"></div>
<div id="box"></div>
</div>
</div>
<script>
const data=${dataStr};
const colors=['#FFB74D','#81C784','#64B5F6','#BA68C8','#F06292','#4FC3F7','#A1887F','#E57373','#FFD54F','#7986CB'];
function icon(u,c){if(c)return c;try{return'https://favicon.zhusl.com/ico?url='+new URL(u).hostname}catch(e){}}
function render(){
const nav=document.getElementById('nav');
const box=document.getElementById('box');
nav.innerHTML='';
box.innerHTML='';
const all=document.createElement('button');
all.className='category-btn active';
all.textContent='全部';
all.onclick=()=>filter('全部');
nav.appendChild(all);
data.icons.forEach(g=>{
const b=document.createElement('button');
b.className='category-btn';
b.textContent=g.title;
b.onclick=()=>filter(g.title);
nav.appendChild(b);
});
data.icons.forEach((g,gi)=>{
const sec=document.createElement('div');
sec.className='group-section';
sec.dataset.cat=g.title;
const t=document.createElement('div');
t.className='group-title';
t.textContent=g.title;
sec.appendChild(t);
const grid=document.createElement('div');
grid.className='grid';
const co=colors[gi%colors.length];
g.children.forEach(it=>{
const c=document.createElement('div');
c.className='card';
c.style.background=co;
const i=document.createElement('img');
i.src=icon(it.url,it.thumbnail);
i.onerror=()=>i.src='https://favicon.zhusl.com/ico?url=baidu.com';
const a=document.createElement('a');
a.href=it.url;
a.target='_blank';
a.textContent=it.title;
c.appendChild(i);
c.appendChild(a);
grid.appendChild(c);
});
sec.appendChild(grid);
box.appendChild(sec);
});
function filter(c){
document.querySelectorAll('.group-section').forEach(s=>{
s.style.display=c==='全部'||s.dataset.cat===c?'block':'none'
});
document.querySelectorAll('.category-btn').forEach(b=>{
b.classList.toggle('active',b.textContent===c)
});
}
}
window.onload=render;
<\/script>
</body>
</html>`;

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = prefix + '.html';
        a.click();
        showToast('HTML 导出成功（已居中）');
    }

    // ====================== 已修复：导出JSON必带缩略图 ======================
    function exportJson() {
        const prefix = document.getElementById('exportPrefix').value.trim() || 'bookmarks';
        const out = {};
        currentData.icons.forEach(g => {
            out[g.title] = g.children.map(c => ({
                name: c.title,
                url: c.url,
                favicon: getBestThumbnail(c.url, c.thumbnail)
            }));
        });
        const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = prefix + '.json';
        a.click();
        showToast('✅ JSON 导出成功（已包含缩略图）');
    }

    function updateColors() {
        document.body.style.background = document.getElementById('pageBackgroundColor').value;
        document.querySelector('.panel').style.background = document.getElementById('panelBackgroundColor').value;
    }

    function openTool() { window.open('https://json.baoge.wang/', '_blank') }
    function openExample() { window.open('https://file.baoge.wang/%E4%B9%A6%E7%AD%BE%E9%A1%B5%E9%9D%A2%E7%94%9F%E6%88%90%E8%84%9A%E6%9C%AC%E6%94%AF%E6%8C%81%E7%9A%84%E4%B8%89%E7%A7%8D%E7%A4%BA%E4%BE%8B%20JSON%20%E6%96%87%E4%BB%B6.txt', '_blank') }

    window.onload = function () {
        document.getElementById('importFileBtn').onclick = importFile;
        document.getElementById('exampleBtn').onclick = openExample;
        document.getElementById('editModeBtn').onclick = toggleEdit;
        document.getElementById('exportHtmlBtn').onclick = () => showPwd('html');
        document.getElementById('exportJsonBtn').onclick = () => showPwd('json');
        document.getElementById('confirmPwdBtn').onclick = checkPwd;
        document.getElementById('saveEditBtn').onclick = saveEdit;
        document.getElementById('deleteBookmarkBtn').onclick = delEdit;
        document.getElementById('confirmAddBtn').onclick = addBook;

        document.getElementById('exportPassword').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkPwd();
        });

        document.querySelectorAll('.close').forEach(x => {
            x.onclick = () => x.closest('.modal').style.display = 'none';
        });

        renderBookmarks();
        updateColors();
    };
</script>
</body>
</html>
