                function _isPasswordExpiredForAuth(password) {
                    if (password.type !== 'temporary') return false;
                    const now = new Date().getTime();
                    const daysDiff = (now - password.createdAt) / (1000 * 60 * 60 * 24);
                    return daysDiff > 7;
                }
                
                // Check if password was remembered
                function _isRememberedForAuth() {
                    try {
                        return localStorage.getItem('auth_remembered') === 'true';
                    } catch (e) {
                        console.warn('localStorage is not available or accessible.', e);
                        return false;
                    }
                }
                
                // Set remembered state
                function _setRememberedForAuth() {
                    try {
                        localStorage.setItem('auth_remembered', 'true');
                    } catch (e) {
                        console.warn('localStorage is not available or accessible.', e);
                    }
                }

                // Display error message on the login UI
                function _showAuthError(message) {
                    const errorDiv = document.getElementById('auth-error-message');
                    const successDiv = document.getElementById('auth-success-message');
                    if (errorDiv) {
                        errorDiv.textContent = message;
                        errorDiv.style.display = 'block';
                    }
                    if (successDiv) successDiv.style.display = 'none'; // Hide success if error occurs
                }

                // Hide error message on the login UI
                function _hideAuthError() {
                    const errorDiv = document.getElementById('auth-error-message');
                    if (errorDiv) {
                        errorDiv.style.display = 'none';
                    }
                }

                /**
                 * Displays a temporary success message after successful authentication.
                 * @param {string} passwordType The type of password used ('normal', 'remember', 'temporary').
                 */
                function _displayAuthSuccessMessage(passwordType) {
                    const successDiv = document.getElementById('auth-success-message');
                    _hideAuthError(); // Hide any previous error messages

                    if (successDiv) {
                        let message = '✅ 验证成功！';
                        if (passwordType === 'remember') {
                            message += ' 此密码将在此浏览器中记住，下次访问无需再次输入。';
                        } else if (passwordType === 'normal') {
                            message += ' 此为普通密码，每次访问都需要重新输入。';
                        } else if (passwordType === 'temporary') {
                            message += ' 此为临时密码，有效期为7天。';
                        }
                        successDiv.innerHTML = message;
                        successDiv.style.display = 'block';
                    }

                    // Delay revealing content to allow user to read the message
                    setTimeout(() => {
                        _revealProtectedContent();
                    }, 2000); // Show message for 2 seconds
                }
                
                /**
                 * Handles the submission of the authentication form.
                 * @param {Event} event The form submission event.
                 */
                async function handleAuthSubmit(event) {
                    event.preventDefault();
                    _hideAuthError(); // Clear previous errors

                    const passwordInput = document.getElementById('auth-password');
                    const userInput = passwordInput ? passwordInput.value.trim() : '';

                    if (!userInput) {
                        _showAuthError('请输入密码！');
                        return;
                    }
                    
                    const hashedUserInput = await _hashStringForAuth(userInput);
                    
                    const password = embeddedPasswordsData.find(p => p.hash === hashedUserInput);
                    
                    if (!password) {
                        authAttempts++;
                        _showAuthError('密码错误，请重新输入！');
                        passwordInput.value = ''; // Clear input
                        if (authAttempts >= maxAuthAttempts) {
                            _lockPage('多次密码尝试失败，页面已被锁定。');
                        }
                        return;
                    }
                    
                    // Check temporary password expiration
                    if (_isPasswordExpiredForAuth(password)) {
                        authAttempts++;
                        _showAuthError('临时密码已过期，请使用其他密码！');
                        passwordInput.value = ''; // Clear input
                        if (authAttempts >= maxAuthAttempts) {
                            _lockPage('多次密码尝试失败，页面已被锁定。');
                        }
                        return;
                    }
                    
                    // Validation successful
                    if (password.type === 'remember') {
                        _setRememberedForAuth();
                    }
                    _displayAuthSuccessMessage(password.type); // Display success message and then reveal content
                }

                /**
                 * Locks the page by replacing body content with an error message.
                 * @param {string} message The message to display on the locked page.
                 */
                function _lockPage(message) {
                    document.body.innerHTML = '<div style="text-align:center; padding:50px; font-size:2em; color:red; background-color:#f8d7da; border:1px solid #f5c6cb; border-radius:10px; margin:50px;">' + message + '</div>';
                    document.body.style.overflow = 'hidden'; // Prevent scrolling
                }

                /**
                 * Removes the authentication overlay and reveals the protected content.
                 */
                function _revealProtectedContent() {
                    const authOverlay = document.getElementById('auth-overlay');
                    if (authOverlay) {
                        authOverlay.remove();
                    }
                    const protectedContent = document.getElementById('protected-content');
                    if (protectedContent) {
                        protectedContent.style.display = ''; // Revert to default display
                    }
                }

                // Main authentication check on page load
                document.addEventListener('DOMContentLoaded', async () => {
                    // Wrap existing body content in a protected-content div if it's not already
                    let protectedContent = document.getElementById('protected-content');
                    if (!protectedContent) {
                        const bodyChildren = Array.from(document.body.children);
                        protectedContent = document.createElement('div');
                        protectedContent.id = 'protected-content';
                        protectedContent.style.display = 'none'; // Hide by default
                        bodyChildren.forEach(child => protectedContent.appendChild(child));
                        document.body.appendChild(protectedContent);
                    } else {
                        protectedContent.style.display = 'none'; // Ensure it's hidden if already there
                    }

                    // If password was remembered, reveal content immediately
                    if (_isRememberedForAuth()) {
                        _revealProtectedContent();
                        return;
                    }

                    // Insert the login UI
                    document.body.insertAdjacentHTML('beforeend', `
            <div id="auth-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #f5f6fa; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans', Arial, sans-serif;">
                <style>
                    /* Scoped styles for the login overlay */
                    #auth-overlay .center-box {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        min-height: 100vh; /* This will be overridden by flexbox centering */
                        width: 100%; /* Ensure it takes full width of overlay */
                    }
                    #auth-overlay .panda-box {
                        position: relative;
                        width: 340px;
                        margin-bottom: -40px;
                        z-index: 2;
                    }
                    #auth-overlay .login-container {
                        position: relative;
                        background: #fff;
                        border-radius: 16px;
                        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
                        padding: 40px 28px 28px 28px;
                        width: 340px;
                        z-index: 1;
                        margin-top: -40px;
                        text-align: center; /* For title and footer */
                    }
                    #auth-overlay .login-title {
                        text-align: center;
                        font-size: 1.5em;
                        color: #333;
                        margin-bottom: 28px;
                        letter-spacing: 2px;
                    }
                    #auth-overlay .form-group {
                        margin-bottom: 18px;
                        text-align: left; /* Align label and input */
                    }
                    #auth-overlay label {
                        display: block;
                        margin-bottom: 6px;
                        color: #555;
                        font-size: 1em;
                    }
                    #auth-overlay input[type="password"] {
                        width: 100%;
                        padding: 8px 10px;
                        border: 1px solid #d0d0d0;
                        border-radius: 4px;
                        font-size: 1em;
                        background: #fafbfc;
                        transition: border 0.2s;
                    }
                    #auth-overlay input[type="password"]:focus {
                        border-color: #1976d2;
                        outline: none;
                    }
                    #auth-overlay .login-btn {
                        width: 100%;
                        padding: 10px 0;
                        background: #1976d2;
                        color: #fff;
                        border: none;
                        border-radius: 4px;
                        font-size: 1.1em;
                        cursor: pointer;
                        margin-top: 10px;
                        transition: background 0.2s;
                    }
                    #auth-overlay .login-btn:hover {
                        background: #1256a3;
                    }
                    #auth-overlay .login-footer {
                        text-align: center;
                        color: #aaa;
                        font-size: 0.95em;
                        margin-top: 18px;
                    }
                    #auth-overlay .error-message {
                        color: #d32f2f;
                        font-size: 0.9em;
                        margin-top: -10px;
                        margin-bottom: 10px;
                        text-align: center;
                        display: none; /* Hidden by default */
                    }
                    #auth-overlay .success-message { /* Added success message style */
                        color: #28a745;
                        font-size: 0.9em;
                        font-weight: bold;
                        margin-top: -10px;
                        margin-bottom: 10px;
                        text-align: center;
                        display: none; /* Hidden by default */
                    }
                    @media (max-width: 500px) {
                        #auth-overlay .panda-box, #auth-overlay .login-container {
                            width: 90vw; /* Adjusted for better mobile fit */
                            min-width: 0;
                            max-width: 98vw;
                        }
                        #auth-overlay .login-container {
                            padding: 30px 20px 20px 20px;
                        }
                        #auth-overlay .panda-box {
                            width: 100%;
                        }
                        #auth-overlay .panda-box svg {
                            width: 100%;
                            height: auto;
                        }
                    }
                </style>
                <div class="center-box">
                    <div class="panda-box">
                        <svg width="340" height="180" viewBox="0 0 340 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <ellipse cx="70" cy="60" rx="36" ry="28" fill="#222"/>
                            <ellipse cx="270" cy="60" rx="36" ry="28" fill="#222"/>
                            <ellipse cx="170" cy="100" rx="100" ry="80" fill="#fff" stroke="#222" stroke-width="4"/>
                            <ellipse cx="120" cy="110" rx="22" ry="16" fill="#222"/>
                            <ellipse cx="220" cy="110" rx="22" ry="16" fill="#222"/>
                            <ellipse cx="120" cy="115" rx="7" ry="7" fill="#fff"/>
                            <ellipse cx="220" cy="115" rx="7" ry="7" fill="#fff"/>
                            <ellipse cx="120" cy="117" rx="3" ry="3" fill="#222"/>
                            <ellipse cx="220" cy="117" rx="3" ry="3" fill="#222"/>
                            <ellipse cx="170" cy="135" rx="10" ry="7" fill="#222"/>
                            <path d="M160 145 Q170 155 180 145" stroke="#222" stroke-width="3" fill="none"/>
                            <ellipse cx="90" cy="170" rx="28" ry="18" fill="#222"/>
                            <ellipse cx="90" cy="170" rx="12" ry="8" fill="#fff"/>
                            <ellipse cx="250" cy="170" rx="28" ry="18" fill="#222"/>
                            <ellipse cx="250" cy="170" rx="12" ry="8" fill="#fff"/>
                            <ellipse cx="110" cy="160" rx="16" ry="10" fill="#222"/>
                            <ellipse cx="230" cy="160" rx="16" ry="10" fill="#222"/>
                        </svg>
                    </div>
                    <div class="login-container">
                        <div class="login-title">页面验证</div>
                        <form id="auth-form">
                            <div class="form-group">
                                <label for="auth-password">密码</label>
                                <input type="password" id="auth-password" name="password" autocomplete="current-password" required>
                            </div>
                            <div id="auth-error-message" class="error-message"></div>
                            <div id="auth-success-message" class="success-message"></div> <!-- Added success message area -->
                            <button type="submit" class="login-btn">验证</button>
                        </form>
                        <div class="login-footer">
                            &copy; 2025 熊猫验证
                        </div>
                    </div>
                </div>
            </div>
            `);

                    // Attach event listener to the form
                    const authForm = document.getElementById('auth-form');
                    if (authForm) {
                        authForm.addEventListener('submit', handleAuthSubmit);
                    }
                });
            </script>
            
            </body>
