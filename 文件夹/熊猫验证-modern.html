<script>
    // --- Client-side Password Protection Script ---
    const embeddedPasswordsData = [{"hash":"4a70942496896e04740dca9e5b98e17de2b324f8e7e6801c73e8bf0ca9760a9d","type":"remember","createdAt":1775210713118}];
    let authAttempts = 0;
    const maxAuthAttempts = 5;

    async function _hashStringForAuth(str) {
        const textEncoder = new TextEncoder();
        const data = textEncoder.encode(str);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function _isPasswordExpiredForAuth(p) {
        if(p.type!='temporary')return false;
        return (Date.now()-p.createdAt)/(1000*60*60*24)>7;
    }

    function _isRememberedForAuth(){
        try{return localStorage.getItem('auth_remembered')==='true'}catch(e){return false}
    }

    function _setRememberedForAuth(){
        try{localStorage.setItem('auth_remembered','true')}catch(e){}
    }

    function _showAuthError(msg){
        const e=document.getElementById('auth-error-message');
        const s=document.getElementById('auth-success-message');
        if(e){e.textContent=msg;e.style.display='block'}
        if(s)s.style.display='none';
    }

    function _hideAuthError(){
        const e=document.getElementById('auth-error-message');
        if(e)e.style.display='none';
    }

    function _displayAuthSuccessMessage(t){
        const s=document.getElementById('auth-success-message');
        _hideAuthError();
        if(s){
            let m='✅ 验证成功！';
            if(t==='remember')m+=' 此密码将在此浏览器中记住';
            s.innerHTML=m;s.style.display='block';
            setTimeout(_revealProtectedContent,1500);
        }
    }

    async function handleAuthSubmit(e){
        e.preventDefault();_hideAuthError();
        const i=document.getElementById('auth-password').value.trim();
        if(!i){_showAuthError('请输入密码！');return}
        const h=await _hashStringForAuth(i);
        const p=embeddedPasswordsData.find(x=>x.hash===h);
        if(!p||_isPasswordExpiredForAuth(p)){
            authAttempts++;_showAuthError(p?'临时密码已过期':'密码错误');
            if(authAttempts>=maxAuthAttempts){
                document.body.innerHTML='<div style="color:red;padding:50px;text-align:center">多次失败，页面已锁定</div>';
                document.body.style.overflow='hidden';
            }
            return;
        }
        if(p.type==='remember')_setRememberedForAuth();
        _displayAuthSuccessMessage(p.type);
    }

    function _revealProtectedContent(){
        const a=document.getElementById('auth-overlay');
        const p=document.getElementById('protected-content');
        if(a)a.remove();
        if(p)p.style.display='block';
    }

    // 先渲染验证界面！
    document.addEventListener('DOMContentLoaded',()=>{
        if(_isRememberedForAuth()){
            document.getElementById('protected-content').style.display='block';
            return;
        }

        document.body.insertAdjacentHTML('beforeend',`
        <div id="auth-overlay" style="position:fixed;inset:0;z-index:9999;background:#f5f6fa;display:flex;align-items:center;justify-content:center;font-family:system-ui">
          <div style="width:340px;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.1);padding:30px;text-align:center">
            <h2 style="margin:0 0 20px">页面验证</h2>
            <form id="auth-form">
              <input type="password" id="auth-password" placeholder="请输入密码" style="width:100%;padding:10px;margin-bottom:15px;border:1px solid #ddd;border-radius:6px">
              <div id="auth-error-message" style="color:red;font-size:14px;margin-bottom:10px;display:none"></div>
              <div id="auth-success-message" style="color:green;font-size:14px;margin-bottom:10px;display:none"></div>
              <button type="submit" style="width:100%;padding:10px;background:#1976d2;color:white;border:none;border-radius:6px;cursor:pointer">验证</button>
            </form>
          </div>
        </div>
        `);

        document.getElementById('auth-form').addEventListener('submit',handleAuthSubmit);
    });
</script>

});

});
}
