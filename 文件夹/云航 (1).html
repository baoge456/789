    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 8px;
            background-color: #f5f5f5;
            transition: background-color 0.2s;
        }
        .panel {
            max-width: 1400px;
            width: calc(100% - 8px);
            margin: 8px auto;
            padding: 16px;
            background-color: #c2f2d0;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.6rem; text-align: center; color: #1f3b2c; margin-top: 0; margin-bottom: 16px; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .group-section {
            margin-bottom: 28px;
            background: rgba(255,255,245,0.3);
            border-radius: 20px;
            padding: 8px 10px 12px;
        }
        .group-title {
            padding: 4px 8px 4px 16px;
            margin-bottom: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            border-left: 5px solid #4caf50;
        }
        .card {
            border-radius: 22px;
            padding: 8px 10px;
            background-color: #ffd966;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .thumbnail {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            flex-shrink: 0;
        }
        .card a {
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            word-break: break-word;
            flex: 1;
            color: #1e1e2a;
        }
        .category-nav {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            padding: 8px 4px;
            background: #e9f7ef;
            border-radius: 40px;
            margin-bottom: 20px;
        }
        .category-btn {
            background: #4caf50;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.82rem;
            white-space: nowrap;
            border: none;
            color: white;
            cursor: pointer;
        }
        .category-btn.active { background: #1b5e20; }
        @media (max-width: 640px) {
            body { margin: 6px; }
            .panel { width: calc(100% - 6px); margin: 6px auto; padding: 12px; }
            .container { grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 10px; }
            .card a { font-size: 0.72rem; }
            .group-title { font-size: 1.15rem; }
        }
        @media (max-width: 480px) {
            .container { grid-template-columns: repeat(auto-fill, minmax(105px,1fr)); }
        }
    </style>
</head>

    const colorPalette = ['#FFB74D','#81C784','#64B5F6','#BA68C8','#F06292','#4FC3F7','#A1887F','#E57373','#FFD54F','#7986CB'];
    function getBestThumbnail(url,custom){ if(custom&&custom.trim()) return custom.trim(); try{ let domain=new URL(url).hostname; return "https://favicon.zhusl.com/ico?url="+domain; }catch(e){ return "https://www.google.com/s2/favicons?domain=placeholder.com"; } }
    function renderStaticBookmarks() {
        const container = document.getElementById('bookmarkContainer');
        const navDiv = document.getElementById('categoryNav');
        if(!container) return;
        container.innerHTML = '';
        navDiv.innerHTML = '';
        if(!embeddedBookmarks.icons || embeddedBookmarks.icons.length===0) { container.innerHTML='<div>暂无书签</div>'; return; }
        const allBtn = document.createElement('button'); allBtn.className='category-btn'; allBtn.textContent='全部';
        allBtn.onclick = () => filterCategory('全部');
        navDiv.appendChild(allBtn);
        embeddedBookmarks.icons.forEach((grp) => {
            const btn = document.createElement('button'); btn.className='category-btn'; btn.textContent=grp.title;
            btn.onclick = () => filterCategory(grp.title);
            navDiv.appendChild(btn);
        });
        function filterCategory(cat) {
            const groups = document.querySelectorAll('.group-section');
            groups.forEach(grp => { const titleSpan = grp.querySelector('.group-title'); const gname = titleSpan ? titleSpan.innerText : ''; grp.style.display = (cat==='全部' || gname===cat) ? 'block' : 'none'; });
            document.querySelectorAll('.category-btn').forEach(btn => { if(btn.textContent===cat) btn.classList.add('active'); else btn.classList.remove('active'); });
        }
        embeddedBookmarks.icons.forEach((group, gIdx) => {
            const groupDiv = document.createElement('div'); groupDiv.className='group-section';
            const titleDiv = document.createElement('div'); titleDiv.className='group-title'; titleDiv.innerText = group.title;
            groupDiv.appendChild(titleDiv);
            const cardsGrid = document.createElement('div'); cardsGrid.className='container';
            const bgColor = colorPalette[gIdx % colorPalette.length];
            group.children.forEach(item => {
                const card = document.createElement('div'); card.className='card'; card.style.backgroundColor = bgColor;
                const thumb = document.createElement('img'); thumb.className='thumbnail';
                thumb.src = getBestThumbnail(item.url, item.thumbnail);
                thumb.onerror = function() { this.src='https://www.google.com/s2/favicons?domain=placeholder.com'; };
                card.appendChild(thumb);
                const link = document.createElement('a'); link.href=item.url; link.target='_blank'; link.textContent=item.title;
                card.appendChild(link);
                cardsGrid.appendChild(card);
            });
            groupDiv.appendChild(cardsGrid);
            container.appendChild(groupDiv);
        });
        filterCategory('全部');
    }
    document.addEventListener('DOMContentLoaded', renderStaticBookmarks);
