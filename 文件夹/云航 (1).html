        *{box-sizing:border-box;}
        html,body{height:100%;margin:0;padding:0;}
        body{
            font-family:system-ui, -apple-system, sans-serif;
            background:#f5f5f5;
            padding:12px;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .panel{
            max-width:1400px;width:100%;
            background:#c2f2d0;
            border-radius:24px;
            padding:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }
        h1{text-align:center;font-size:22px;margin-top:0;}
        .category-nav{
            display:flex;gap:8px;overflow-x:auto;
            padding:10px;background:#e9f7ef;border-radius:24px;margin-bottom:20px;
        }
        .category-btn{
            background:#4caf50;color:white;border:none;
            padding:6px 14px;border-radius:20px;white-space:nowrap;cursor:pointer;
        }
        .category-btn.active{background:#1b5e20;}
        .group-section{margin-bottom:24px;}
        .group-title{
            font-size:18px;font-weight:bold;margin-bottom:10px;
            border-left:4px solid #4caf50;padding-left:10px;
        }
        .container{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
            gap:10px;
        }
        .card{
            background:#ffd966;border-radius:16px;padding:8px 10px;
            display:flex;align-items:center;gap:8px;
        }
        .thumbnail{width:26px;height:26px;border-radius:50%;object-fit:cover;}
        .card a{text-decoration:none;color:#000;font-size:14px;}
    </style>
</head>

    const colorPalette=['#FFB74D','#81C784','#64B5F6','#BA68C8','#F06292','#4FC3F7','#A1887F','#E57373','#FFD54F','#7986CB'];
    function getIcon(u,c){if(c)return c;try{return `https://favicon.zhusl.com/ico?url=${new URL(u).hostname}`}catch(e){return""}}
    function render(){
        const nav=document.getElementById('nav');
        const box=document.getElementById('container');
        nav.innerHTML='';
        box.innerHTML='';
        const all=document.createElement('button');
        all.className='category-btn';all.textContent='全部';
        all.onclick=()=>show('全部');
        nav.appendChild(all);
        data.icons.forEach((g,i)=>{
            const b=document.createElement('button');
            b.className='category-btn';b.textContent=g.title;
            b.onclick=()=>show(g.title);
            nav.appendChild(b);
        });
        data.icons.forEach((g,gi)=>{
            const sec=document.createElement('div');
            sec.className='group-section';
            sec.dataset.name=g.title;
            const t=document.createElement('div');
            t.className='group-title';
            t.textContent=g.title;
            sec.appendChild(t);
            const grid=document.createElement('div');
            grid.className='container';
            const c=colorPalette[gi%colorPalette.length];
            g.children.forEach(it=>{
                const card=document.createElement('div');
                card.className='card';
                card.style.background=c;
                const img=document.createElement('img');
                img.className='thumbnail';
                img.src=getIcon(it.url,it.thumbnail);
                card.appendChild(img);
                const a=document.createElement('a');
                a.href=it.url;
                a.target='_blank';
                a.textContent=it.title;
                card.appendChild(a);
                grid.appendChild(card);
            });
            sec.appendChild(grid);
            box.appendChild(sec);
        });
        function show(n){
            document.querySelectorAll('.group-section').forEach(s=>{
                s.style.display=n==='全部'||s.dataset.name===n?'block':'none';
            });
            document.querySelectorAll('.category-btn').forEach(b=>{
                b.classList.toggle('active',b.textContent===n);
            });
        }
        show('全部');
    }
    window.addEventListener('DOMContentLoaded',render);
